<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Dashboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f7;
      color: #1a1a2e;
    }
    header {
      background: #1a1a2e;
      color: #fff;
      padding: 16px 32px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    header h1 { font-size: 20px; }
    .user-info { display: flex; gap: 16px; align-items: center; font-size: 14px; }
    .btn {
      background: #c41e3a;
      color: #fff;
      border: none;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      transition: background 0.15s;
    }
    .btn:hover { background: #a01830; }
    .btn-sm { padding: 4px 10px; font-size: 12px; }
    .btn-primary { background: #1976d2; }
    .btn-primary:hover { background: #1565c0; }
    .btn-warning { background: #f57c00; }
    .btn-warning:hover { background: #e65100; }
    .btn-secondary { background: #666; }
    .btn-secondary:hover { background: #555; }
    main { max-width: 1400px; margin: 0 auto; padding: 32px; }
    .summary {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 16px;
      margin-bottom: 32px;
    }
    .stat-card {
      background: #fff;
      border-radius: 10px;
      padding: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    .stat-label { font-size: 12px; color: #888; text-transform: uppercase; letter-spacing: 0.5px; }
    .stat-value { font-size: 28px; font-weight: 700; margin-top: 6px; }
    .stat-value.critical { color: #c62828; }
    .stat-value.ok { color: #2e7d32; }
    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }
    h2 { font-size: 22px; }
    table {
      width: 100%;
      background: #fff;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      border-collapse: collapse;
    }
    th, td {
      padding: 12px 16px;
      text-align: left;
      border-bottom: 1px solid #f0f0f0;
      vertical-align: middle;
    }
    th {
      background: #fafafa;
      font-size: 12px;
      text-transform: uppercase;
      color: #666;
      letter-spacing: 0.5px;
    }
    tr:last-child td { border-bottom: none; }
    tr:hover { background: #fafafa; }
    .status-badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
    }
    .status-CRITICAL, .status-EXPIRED { background: #ffebee; color: #c62828; }
    .status-HIGH, .status-EXPIRING_SOON { background: #fff3e0; color: #e65100; }
    .status-MODERATE { background: #fffde7; color: #f57c00; }
    .status-LOW, .status-ACTIVE { background: #e8f5e9; color: #2e7d32; }
    .bar-bg { background: #eee; border-radius: 4px; height: 6px; overflow: hidden; width: 120px; }
    .bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #4caf50 0%, #ff9800 70%, #f44336 90%);
    }
    .tabs { display: flex; gap: 8px; margin-bottom: 20px; }
    .tab-btn {
      padding: 10px 20px;
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
    }
    .tab-btn.active {
      background: #1a1a2e;
      color: #fff;
      border-color: #1a1a2e;
    }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }
    .loading { text-align: center; padding: 40px; color: #666; }
    .actions { white-space: nowrap; }
    .actions button { margin-right: 4px; }

    /* Modal */
    .modal-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: #fff;
      border-radius: 10px;
      padding: 28px;
      width: 100%;
      max-width: 500px;
      max-height: 90vh;
      overflow-y: auto;
    }
    .modal h3 { margin-bottom: 20px; font-size: 20px; }
    .modal .form-row { margin-bottom: 14px; }
    .modal label {
      display: block;
      font-size: 13px;
      color: #666;
      margin-bottom: 4px;
    }
    .modal input, .modal select, .modal textarea {
      width: 100%;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 14px;
    }
    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 20px;
    }
    .rules-mini-table { margin-top: 16px; }
    .rules-mini-table th, .rules-mini-table td {
      padding: 8px 12px;
      font-size: 13px;
    }
    .rule-form-inline {
      background: #f9f9f9;
      padding: 14px;
      border-radius: 8px;
      margin-top: 12px;
    }
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: #2e7d32;
      color: #fff;
      padding: 14px 20px;
      border-radius: 8px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.2);
      z-index: 2000;
      display: none;
      animation: slideIn 0.2s;
    }
    .toast.error { background: #c62828; }
    .toast.show { display: block; }
    @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
  </style>
</head>
<body>
  <header>
    <h1>Parking Admin Dashboard</h1>
    <div class="user-info">
      <span id="userLabel"></span>
      <button class="btn" onclick="logout()">Logout</button>
    </div>
  </header>

  <main>
    <div class="tabs">
      <button class="tab-btn active" data-tab="dashboard" onclick="switchTab('dashboard')">Dashboard</button>
      <button class="tab-btn" data-tab="permits" onclick="switchTab('permits')">Permits</button>
      <button class="tab-btn" data-tab="users" onclick="switchTab('users')">Users</button>
    </div>

    <!-- DASHBOARD TAB -->
    <div id="dashboard-panel" class="tab-panel active">
      <div id="summary" class="summary"></div>
      <div class="section-header">
        <h2>Parking Lots</h2>
        <button class="btn btn-primary" onclick="openLotModal()">+ Add New Lot</button>
      </div>
      <div id="lots-table" class="loading">Loading...</div>
    </div>

    <!-- PERMITS TAB -->
    <div id="permits-panel" class="tab-panel">
      <div class="section-header">
        <h2>Permit Types</h2>
        <button class="btn btn-primary" onclick="openPermitModal()">+ Add Permit</button>
      </div>
      <div id="permits-table" class="loading">Loading...</div>
    </div>

    <!-- USERS TAB -->
    <div id="users-panel" class="tab-panel">
      <div class="section-header">
        <h2>Users &amp; Permit Assignments</h2>
        <button class="btn btn-primary" onclick="openAssignModal()">+ Assign Permit</button>
      </div>
      <div id="users-table" class="loading">Loading...</div>
    </div>
  </main>

  <!-- ===== MODALS ===== -->

  <div class="modal-overlay" id="lot-modal">
    <div class="modal">
      <h3 id="lot-modal-title">Add New Lot</h3>
      <input type="hidden" id="lot-id-hidden" />
      <div class="form-row"><label>Lot Name</label><input type="text" id="lot-name" /></div>
      <div class="form-row"><label>Latitude</label><input type="number" step="0.000001" id="lot-lat" placeholder="34.365" /></div>
      <div class="form-row"><label>Longitude</label><input type="number" step="0.000001" id="lot-lon" placeholder="-89.538" /></div>
      <div class="form-row"><label>Capacity</label><input type="number" id="lot-cap" /></div>
      <div class="form-row"><label>EV Chargers</label><input type="number" id="lot-ev" value="0" /></div>
      <div class="modal-actions">
        <button class="btn btn-secondary" onclick="closeModal('lot-modal')">Cancel</button>
        <button class="btn" onclick="saveLot()">Save</button>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="lot-detail-modal">
    <div class="modal" style="max-width: 700px;">
      <h3 id="lot-detail-title">Lot Detail</h3>
      <div id="lot-detail-content"></div>
      <div class="modal-actions">
        <button class="btn btn-secondary" onclick="closeModal('lot-detail-modal')">Close</button>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="occupancy-modal">
    <div class="modal">
      <h3>Update Occupancy</h3>
      <input type="hidden" id="occ-lot-id" />
      <p id="occ-lot-name" style="margin-bottom:14px; color:#666;"></p>
      <div class="form-row"><label>Current Occupancy</label><input type="number" id="occ-count" /></div>
      <div class="form-row"><label>EV Chargers In Use</label><input type="number" id="occ-ev" value="0" /></div>
      <div class="modal-actions">
        <button class="btn btn-secondary" onclick="closeModal('occupancy-modal')">Cancel</button>
        <button class="btn" onclick="saveOccupancy()">Update</button>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="permit-modal">
    <div class="modal">
      <h3 id="permit-modal-title">Add Permit</h3>
      <input type="hidden" id="permit-is-edit" value="0" />
      <div class="form-row"><label>Permit ID (max 5 chars, e.g. "EV")</label><input type="text" id="permit-id" maxlength="5" /></div>
      <div class="form-row"><label>Permit Name</label><input type="text" id="permit-name" /></div>
      <div class="form-row"><label>Description</label><textarea id="permit-desc" rows="2"></textarea></div>
      <div class="modal-actions">
        <button class="btn btn-secondary" onclick="closeModal('permit-modal')">Cancel</button>
        <button class="btn" onclick="savePermit()">Save</button>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="assign-modal">
    <div class="modal">
      <h3>Assign Permit to User</h3>
      <div class="form-row"><label>User ID (e.g. stu001)</label><input type="text" id="assign-user-id" /></div>
      <div class="form-row"><label>Permit ID</label><select id="assign-permit-id"></select></div>
      <div class="form-row"><label>Issued Date</label><input type="date" id="assign-issued" /></div>
      <div class="form-row"><label>Expiration Date</label><input type="date" id="assign-expires" /></div>
      <div class="modal-actions">
        <button class="btn btn-secondary" onclick="closeModal('assign-modal')">Cancel</button>
        <button class="btn" onclick="saveAssignment()">Assign</button>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="renew-modal">
    <div class="modal">
      <h3>Renew Permit</h3>
      <input type="hidden" id="renew-user-id" />
      <input type="hidden" id="renew-permit-id" />
      <p id="renew-info" style="margin-bottom:14px; color:#666;"></p>
      <div class="form-row"><label>Issued Date</label><input type="date" id="renew-issued" /></div>
      <div class="form-row"><label>New Expiration Date</label><input type="date" id="renew-expires" /></div>
      <div class="modal-actions">
        <button class="btn btn-secondary" onclick="closeModal('renew-modal')">Cancel</button>
        <button class="btn" onclick="saveRenewal()">Renew</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    // ====== AUTH / SESSION ======
    const token = localStorage.getItem("token");
    const user = JSON.parse(localStorage.getItem("user") || "{}");

    if (!token || user.role !== "admin") {
      alert("Admin access required.");
      location.href = "/";
    }

    document.getElementById("userLabel").textContent =
      `${user.first_name} ${user.last_name} · Admin`;

    function logout() { localStorage.clear(); location.href = "/"; }
    function authHeaders() {
      return { "Content-Type": "application/json", Authorization: `Bearer ${token}` };
    }

    function toast(msg, isError = false) {
      const t = document.getElementById("toast");
      t.textContent = msg;
      t.className = "toast show" + (isError ? " error" : "");
      setTimeout(() => t.className = "toast", 2500);
    }

    async function apiCall(method, url, body = null) {
      const opts = { method, headers: authHeaders() };
      if (body) opts.body = JSON.stringify(body);
      const res = await fetch(url, opts);
      const data = await res.json().catch(() => ({}));
      if (res.status === 401) { logout(); return null; }
      if (!res.ok) {
        toast(data.detail || `Error ${res.status}`, true);
        throw new Error(data.detail || "Request failed");
      }
      return data;
    }

    function openModal(id) { document.getElementById(id).classList.add("open"); }
    function closeModal(id) { document.getElementById(id).classList.remove("open"); }

    function switchTab(name) {
      document.querySelectorAll(".tab-btn").forEach(b => {
        b.classList.toggle("active", b.dataset.tab === name);
      });
      document.querySelectorAll(".tab-panel").forEach(p => p.classList.remove("active"));
      document.getElementById(`${name}-panel`).classList.add("active");
      if (name === "dashboard") loadDashboard();
      if (name === "permits") loadPermits();
      if (name === "users") loadUsers();
    }

    // ====== DASHBOARD / LOTS ======

    async function loadDashboard() {
      try {
        const data = await apiCall("GET", "/api/admin/dashboard");
        if (!data) return;
        renderSummary(data.summary);
        renderLots(data.lots);
      } catch (e) { /* handled in apiCall */ }
    }

    function renderSummary(s) {
      document.getElementById("summary").innerHTML = `
        <div class="stat-card"><div class="stat-label">Total Capacity</div><div class="stat-value">${s.total_capacity}</div></div>
        <div class="stat-card"><div class="stat-label">Currently Occupied</div><div class="stat-value">${s.total_occupied}</div></div>
        <div class="stat-card"><div class="stat-label">Overall %</div><div class="stat-value">${s.overall_occupancy_pct}%</div></div>
        <div class="stat-card"><div class="stat-label">Critical Lots</div><div class="stat-value ${s.critical_lots > 0 ? 'critical' : 'ok'}">${s.critical_lots}</div></div>
      `;
    }

    function renderLots(lots) {
      const rows = lots.map(l => `
        <tr>
          <td><strong>${l.lot_name}</strong></td>
          <td><span class="status-badge status-${l.status_level}">${l.status_level}</span></td>
          <td><div class="bar-bg"><div class="bar-fill" style="width:${l.occupancy_pct}%"></div></div></td>
          <td>${l.current_occupancy} / ${l.capacity}</td>
          <td>${l.occupancy_pct}%</td>
          <td>${l.ev_charger_count}</td>
          <td class="actions">
            <button class="btn btn-sm btn-primary" onclick="viewLot(${l.lot_id})">View / Rules</button>
            <button class="btn btn-sm btn-warning" onclick="editLot(${l.lot_id})">Edit</button>
            <button class="btn btn-sm" onclick="openOccupancyModal(${l.lot_id}, '${(l.lot_name || '').replace(/'/g, "\\'")}')">Occupancy</button>
            <button class="btn btn-sm" onclick="deleteLot(${l.lot_id}, '${(l.lot_name || '').replace(/'/g, "\\'")}')">Delete</button>
          </td>
        </tr>
      `).join("");

      document.getElementById("lots-table").classList.remove("loading");
      document.getElementById("lots-table").innerHTML = `
        <table>
          <thead><tr>
            <th>Lot</th><th>Status</th><th>Utilization</th><th>Occupancy</th>
            <th>% Full</th><th>EV</th><th>Actions</th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>
      `;
    }

    // ----- Lot CRUD -----

    function openLotModal(lot = null) {
      document.getElementById("lot-modal-title").textContent = lot ? "Edit Lot" : "Add New Lot";
      document.getElementById("lot-id-hidden").value = lot ? lot.lot_id : "";
      document.getElementById("lot-name").value = lot ? lot.lot_name : "";
      document.getElementById("lot-lat").value = lot ? lot.latitude : "";
      document.getElementById("lot-lon").value = lot ? lot.longitude : "";
      document.getElementById("lot-cap").value = lot ? lot.capacity : "";
      document.getElementById("lot-ev").value = lot ? lot.ev_charger_count : 0;
      openModal("lot-modal");
    }

    async function editLot(lotId) {
      const data = await apiCall("GET", `/api/admin/lots/${lotId}`);
      if (data) openLotModal(data.lot);
    }

    async function saveLot() {
      const id = document.getElementById("lot-id-hidden").value;
      const body = {
        lot_name: document.getElementById("lot-name").value,
        latitude: parseFloat(document.getElementById("lot-lat").value),
        longitude: parseFloat(document.getElementById("lot-lon").value),
        capacity: parseInt(document.getElementById("lot-cap").value),
        ev_charger_count: parseInt(document.getElementById("lot-ev").value || 0),
      };
      try {
        if (id) {
          await apiCall("PUT", `/api/admin/lots/${id}`, body);
          toast("Lot updated");
        } else {
          await apiCall("POST", "/api/admin/lots", body);
          toast("Lot created");
        }
        closeModal("lot-modal");
        loadDashboard();
      } catch (e) {}
    }

    async function deleteLot(lotId, name) {
      if (!confirm(`Decommission "${name}"? This removes all its rules and occupancy logs.`)) return;
      try {
        const data = await apiCall("DELETE", `/api/admin/lots/${lotId}`);
        if (data) {
          toast(`Deleted (${data.rules_deleted} rules, ${data.logs_deleted} logs removed)`);
          loadDashboard();
        }
      } catch (e) {}
    }

    // ----- Lot Detail + Rules -----

    async function viewLot(lotId) {
      const data = await apiCall("GET", `/api/admin/lots/${lotId}`);
      if (!data) return;

      document.getElementById("lot-detail-title").textContent = data.lot.lot_name;
      document.getElementById("lot-detail-content").innerHTML = `
        <div style="margin-bottom:16px; color:#666;">
          Capacity: <strong>${data.lot.capacity}</strong> ·
          Occupancy: <strong>${data.lot.current_occupancy}</strong> (${data.lot.occupancy_pct}%) ·
          EV Chargers: <strong>${data.lot.ev_charger_count}</strong>
        </div>
        <h4 style="margin-bottom:8px;">Parking Rules</h4>
        <table class="rules-mini-table">
          <thead><tr><th>Permit</th><th>Days</th><th>Start</th><th>End</th><th>Status</th><th>Actions</th></tr></thead>
          <tbody>
            ${data.rules.map(r => `
              <tr>
                <td>${r.permit_name}</td>
                <td>${r.day_of_week}</td>
                <td>${r.start_time}</td>
                <td>${r.end_time}</td>
                <td>${r.is_allowed ? "Active" : "Disabled"}</td>
                <td class="actions">
                  <button class="btn btn-sm btn-secondary" onclick="toggleRule(${r.rule_id}, ${data.lot.lot_id})">${r.is_allowed ? "Disable" : "Enable"}</button>
                  <button class="btn btn-sm" onclick="deleteRule(${r.rule_id}, ${data.lot.lot_id})">Delete</button>
                </td>
              </tr>
            `).join("")}
          </tbody>
        </table>
        <div class="rule-form-inline">
          <strong style="display:block; margin-bottom:8px;">Add New Rule</strong>
          <div style="display:grid; grid-template-columns: repeat(2, 1fr); gap:8px;">
            <select id="new-rule-permit"></select>
            <input type="text" id="new-rule-days" placeholder="Mon,Tue,Wed,Thu,Fri" />
            <input type="time" id="new-rule-start" value="07:00" />
            <input type="time" id="new-rule-end" value="17:00" />
          </div>
          <button class="btn btn-sm btn-primary" style="margin-top:10px;" onclick="addRule(${data.lot.lot_id})">Add Rule</button>
        </div>
      `;

      // Populate permit dropdown for new rule
      const permits = await apiCall("GET", "/api/admin/permits");
      if (permits) {
        document.getElementById("new-rule-permit").innerHTML =
          permits.permits.map(p => `<option value="${p.permit_id}">${p.permit_id} — ${p.permit_name}</option>`).join("");
      }

      openModal("lot-detail-modal");
    }

    async function addRule(lotId) {
      const body = {
        lot_id: lotId,
        permit_id: document.getElementById("new-rule-permit").value,
        day_of_week: document.getElementById("new-rule-days").value,
        start_time: document.getElementById("new-rule-start").value + ":00",
        end_time: document.getElementById("new-rule-end").value + ":00",
      };
      try {
        await apiCall("POST", "/api/admin/rules", body);
        toast("Rule added");
        viewLot(lotId);
      } catch (e) {}
    }

    async function toggleRule(ruleId, lotId) {
      try {
        await apiCall("PATCH", `/api/admin/rules/${ruleId}/toggle`);
        toast("Rule toggled");
        viewLot(lotId);
      } catch (e) {}
    }

    async function deleteRule(ruleId, lotId) {
      if (!confirm("Delete this rule?")) return;
      try {
        await apiCall("DELETE", `/api/admin/rules/${ruleId}`);
        toast("Rule deleted");
        viewLot(lotId);
      } catch (e) {}
    }

    // ----- Occupancy -----

    function openOccupancyModal(lotId, lotName) {
      document.getElementById("occ-lot-id").value = lotId;
      document.getElementById("occ-lot-name").textContent = lotName;
      document.getElementById("occ-count").value = "";
      document.getElementById("occ-ev").value = 0;
      openModal("occupancy-modal");
    }

    async function saveOccupancy() {
      const lotId = document.getElementById("occ-lot-id").value;
      const body = {
        occupancy: parseInt(document.getElementById("occ-count").value),
        ev_chargers_in_use: parseInt(document.getElementById("occ-ev").value || 0),
      };
      try {
        await apiCall("PUT", `/api/admin/lots/${lotId}/occupancy`, body);
        toast("Occupancy updated and logged");
        closeModal("occupancy-modal");
        loadDashboard();
      } catch (e) {}
    }

    // ====== PERMITS ======

    async function loadPermits() {
      const data = await apiCall("GET", "/api/admin/permits");
      if (!data) return;
      const rows = data.permits.map(p => `
        <tr>
          <td><strong>${p.permit_id}</strong></td>
          <td>${p.permit_name}</td>
          <td>${p.description || "-"}</td>
          <td class="actions">
            <button class="btn btn-sm btn-warning" onclick='editPermit(${JSON.stringify(p).replace(/'/g, "&apos;")})'>Edit</button>
            <button class="btn btn-sm" onclick="deletePermit('${p.permit_id}', '${(p.permit_name || '').replace(/'/g, "\\'")}')">Delete</button>
          </td>
        </tr>
      `).join("");
      document.getElementById("permits-table").classList.remove("loading");
      document.getElementById("permits-table").innerHTML = `
        <table>
          <thead><tr><th>ID</th><th>Name</th><th>Description</th><th>Actions</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      `;
    }

    function openPermitModal() {
      document.getElementById("permit-modal-title").textContent = "Add Permit";
      document.getElementById("permit-is-edit").value = "0";
      document.getElementById("permit-id").value = "";
      document.getElementById("permit-id").disabled = false;
      document.getElementById("permit-name").value = "";
      document.getElementById("permit-desc").value = "";
      openModal("permit-modal");
    }

    function editPermit(p) {
      document.getElementById("permit-modal-title").textContent = "Edit Permit";
      document.getElementById("permit-is-edit").value = "1";
      document.getElementById("permit-id").value = p.permit_id;
      document.getElementById("permit-id").disabled = true;
      document.getElementById("permit-name").value = p.permit_name;
      document.getElementById("permit-desc").value = p.description || "";
      openModal("permit-modal");
    }

    async function savePermit() {
      const isEdit = document.getElementById("permit-is-edit").value === "1";
      const pid = document.getElementById("permit-id").value;
      const body = {
        permit_id: pid,
        permit_name: document.getElementById("permit-name").value,
        description: document.getElementById("permit-desc").value,
      };
      try {
        if (isEdit) {
          await apiCall("PUT", `/api/admin/permits/${pid}`, {
            permit_name: body.permit_name,
            description: body.description,
          });
          toast("Permit updated");
        } else {
          await apiCall("POST", "/api/admin/permits", body);
          toast("Permit created");
        }
        closeModal("permit-modal");
        loadPermits();
      } catch (e) {}
    }

    async function deletePermit(pid, name) {
      if (!confirm(`Delete permit "${name}"? Blocks if any rules or users use it.`)) return;
      try {
        await apiCall("DELETE", `/api/admin/permits/${pid}`);
        toast("Permit deleted");
        loadPermits();
      } catch (e) {}
    }

    // ====== USERS ======

    async function loadUsers() {
      const data = await apiCall("GET", "/api/admin/users");
      if (!data) return;
      const rows = data.users.map(u => `
        <tr>
          <td>${u.user_id}</td>
          <td>${u.first_name} ${u.last_name}</td>
          <td>${u.email}</td>
          <td>${u.role}</td>
          <td>${u.permit_name || "-"}</td>
          <td>${u.expiration_date || "-"}</td>
          <td>${u.permit_status ? `<span class="status-badge status-${u.permit_status}">${u.permit_status}</span>` : "-"}</td>
          <td class="actions">
            ${u.permit_id ? `
              <button class="btn btn-sm btn-warning" onclick="openRenewModal('${u.user_id}', '${u.permit_id}', '${u.first_name} ${u.last_name}', '${u.permit_name}', '${u.expiration_date || ''}', '${u.issued_date || ''}')">Renew</button>
              <button class="btn btn-sm" onclick="revokePermit('${u.user_id}', '${u.permit_id}', '${u.permit_name}', '${u.first_name} ${u.last_name}')">Revoke</button>
            ` : ''}
          </td>
        </tr>
      `).join("");
      document.getElementById("users-table").classList.remove("loading");
      document.getElementById("users-table").innerHTML = `
        <table>
          <thead><tr>
            <th>User ID</th><th>Name</th><th>Email</th><th>Role</th>
            <th>Permit</th><th>Expires</th><th>Status</th><th>Actions</th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>
      `;
    }

    async function openAssignModal() {
      const permits = await apiCall("GET", "/api/admin/permits");
      if (!permits) return;
      document.getElementById("assign-permit-id").innerHTML =
        permits.permits.map(p => `<option value="${p.permit_id}">${p.permit_id} — ${p.permit_name}</option>`).join("");
      document.getElementById("assign-user-id").value = "";
      document.getElementById("assign-issued").value = new Date().toISOString().slice(0, 10);
      document.getElementById("assign-expires").value = "";
      openModal("assign-modal");
    }

    async function saveAssignment() {
      const body = {
        user_id: document.getElementById("assign-user-id").value,
        permit_id: document.getElementById("assign-permit-id").value,
        issued_date: document.getElementById("assign-issued").value,
        expiration_date: document.getElementById("assign-expires").value,
      };
      try {
        await apiCall("POST", "/api/admin/user-permits", body);
        toast("Permit assigned");
        closeModal("assign-modal");
        loadUsers();
      } catch (e) {}
    }

    function openRenewModal(userId, permitId, userName, permitName, expires, issued) {
      document.getElementById("renew-user-id").value = userId;
      document.getElementById("renew-permit-id").value = permitId;
      document.getElementById("renew-info").textContent =
        `${userName} — ${permitName} (currently expires ${expires})`;
      document.getElementById("renew-issued").value = issued || new Date().toISOString().slice(0, 10);
      document.getElementById("renew-expires").value = expires || "";
      openModal("renew-modal");
    }

    async function saveRenewal() {
      const userId = document.getElementById("renew-user-id").value;
      const permitId = document.getElementById("renew-permit-id").value;
      const body = {
        issued_date: document.getElementById("renew-issued").value,
        expiration_date: document.getElementById("renew-expires").value,
      };
      try {
        await apiCall("PUT", `/api/admin/user-permits/${userId}/${permitId}`, body);
        toast("Permit renewed");
        closeModal("renew-modal");
        loadUsers();
      } catch (e) {}
    }

    async function revokePermit(userId, permitId, permitName, userName) {
      if (!confirm(`Revoke ${permitName} from ${userName}?`)) return;
      try {
        await apiCall("DELETE", `/api/admin/user-permits/${userId}/${permitId}`);
        toast("Permit revoked");
        loadUsers();
      } catch (e) {}
    }

    // Initial load
    loadDashboard();
  </script>
</body>
</html>
