<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ole Miss Parking — Login</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
    }
    .card {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
    }
    h1 { font-size: 28px; margin-bottom: 8px; text-align: center; }
    .subtitle {
      text-align: center;
      color: #a0a8c8;
      margin-bottom: 32px;
      font-size: 14px;
    }
    .tab-row {
      display: flex;
      margin-bottom: 24px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .tab {
      flex: 1;
      padding: 12px;
      text-align: center;
      cursor: pointer;
      color: #a0a8c8;
      transition: color 0.2s;
    }
    .tab.active {
      color: #fff;
      border-bottom: 2px solid #c41e3a;
    }
    label { display: block; margin-bottom: 6px; font-size: 13px; color: #c0c8e0; }
    input, select {
      width: 100%;
      padding: 12px;
      margin-bottom: 16px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 8px;
      color: #fff;
      font-size: 14px;
    }
    input:focus, select:focus {
      outline: none;
      border-color: #c41e3a;
    }
    .btn {
      width: 100%;
      padding: 14px;
      background: #c41e3a;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn:hover { background: #a01830; }
    .btn-secondary {
      background: rgba(255,255,255,0.1);
      margin-top: 12px;
    }
    .btn-secondary:hover { background: rgba(255,255,255,0.15); }
    .msg {
      padding: 10px;
      border-radius: 6px;
      margin-bottom: 16px;
      font-size: 13px;
      text-align: center;
    }
    .msg.error { background: rgba(196, 30, 58, 0.2); color: #ff8095; }
    .msg.success { background: rgba(40, 160, 80, 0.2); color: #80e0a0; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Ole Miss Parking</h1>
    <p class="subtitle">Campus Parking Availability</p>

    <div class="tab-row">
      <div class="tab active" id="tab-login" onclick="switchTab('login')">Login</div>
      <div class="tab" id="tab-signup" onclick="switchTab('signup')">Sign Up</div>
    </div>

    <div id="msg"></div>

    <!-- LOGIN FORM -->
    <form id="loginForm" onsubmit="handleLogin(event)">
      <label>Email</label>
      <input type="email" id="loginEmail" required placeholder="you@olemiss.edu" />
      <label>Password</label>
      <input type="password" id="loginPassword" required />
      <button type="submit" class="btn">Log In</button>
      <button type="button" class="btn btn-secondary" onclick="location.href='/map'">
        Continue as Visitor
      </button>
    </form>

    <!-- SIGNUP FORM -->
    <form id="signupForm" class="hidden" onsubmit="handleSignup(event)">
      <label>First Name</label>
      <input type="text" id="firstName" required />
      <label>Last Name</label>
      <input type="text" id="lastName" required />
      <label>Email</label>
      <input type="email" id="signupEmail" required />
      <label>Password</label>
      <input type="password" id="signupPassword" required minlength="4" />
      <label>Role</label>
      <select id="role" required>
        <option value="">Select role...</option>
        <option value="student">Student</option>
        <option value="faculty">Faculty</option>
        <option value="visitor">Visitor</option>
      </select>
      <button type="submit" class="btn">Create Account</button>
    </form>
  </div>

  <script>
    function switchTab(which) {
      document.getElementById("tab-login").classList.toggle("active", which === "login");
      document.getElementById("tab-signup").classList.toggle("active", which === "signup");
      document.getElementById("loginForm").classList.toggle("hidden", which !== "login");
      document.getElementById("signupForm").classList.toggle("hidden", which !== "signup");
      document.getElementById("msg").innerHTML = "";
    }

    function showMsg(text, type = "error") {
      document.getElementById("msg").innerHTML =
        `<div class="msg ${type}">${text}</div>`;
    }

    async function handleLogin(e) {
      e.preventDefault();
      const email = document.getElementById("loginEmail").value;
      const password = document.getElementById("loginPassword").value;

      try {
        const res = await fetch("/api/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password }),
        });
        const data = await res.json();

        if (!res.ok) {
          showMsg(data.detail || "Login failed");
          return;
        }

        // Save token + user info
        localStorage.setItem("token", data.access_token);
        localStorage.setItem("user", JSON.stringify(data));

        // Role-based redirect
        if (data.role === "admin") {
          location.href = "/admin";
        } else {
          location.href = "/map";
        }
      } catch (err) {
        showMsg("Network error: " + err.message);
      }
    }

    async function handleSignup(e) {
      e.preventDefault();
      const body = {
        first_name: document.getElementById("firstName").value,
        last_name: document.getElementById("lastName").value,
        email: document.getElementById("signupEmail").value,
        password: document.getElementById("signupPassword").value,
        role: document.getElementById("role").value,
      };

      try {
        const res = await fetch("/api/register", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body),
        });
        const data = await res.json();

        if (!res.ok) {
          showMsg(data.detail || "Signup failed");
          return;
        }
        showMsg(`Account created! User ID: ${data.user_id}. Log in to continue.`, "success");
        switchTab("login");
      } catch (err) {
        showMsg("Network error: " + err.message);
      }
    }
  </script>
</body>
</html>
