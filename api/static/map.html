<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ole Miss Parking — Map</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f7;
      color: #1a1a2e;
    }
    header {
      background: #1a1a2e;
      color: #fff;
      padding: 16px 32px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    header h1 { font-size: 20px; }
    .user-info { display: flex; gap: 16px; align-items: center; font-size: 14px; }
    .btn-logout {
      background: #c41e3a;
      color: #fff;
      border: none;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
    }
    main { max-width: 1200px; margin: 0 auto; padding: 32px; }
    h2 { margin-bottom: 20px; }
    .lots-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 16px;
      margin-bottom: 32px;
    }
    .lot-card {
      background: #fff;
      border-radius: 10px;
      padding: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .lot-card:hover { transform: translateY(-2px); box-shadow: 0 4px 14px rgba(0,0,0,0.1); }
    .lot-name { font-size: 16px; font-weight: 600; margin-bottom: 8px; }
    .status-badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      margin-bottom: 12px;
    }
    .status-CRITICAL { background: #ffebee; color: #c62828; }
    .status-HIGH { background: #fff3e0; color: #e65100; }
    .status-MODERATE { background: #fffde7; color: #f57c00; }
    .status-LOW { background: #e8f5e9; color: #2e7d32; }
    .bar-bg { background: #eee; border-radius: 4px; height: 8px; overflow: hidden; }
    .bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #4caf50 0%, #ff9800 70%, #f44336 90%);
    }
    .lot-stats {
      display: flex;
      justify-content: space-between;
      margin-top: 8px;
      font-size: 13px;
      color: #666;
    }
    #result-panel {
      position: fixed;
      right: 32px;
      bottom: 32px;
      background: #fff;
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.2);
      max-width: 400px;
      display: none;
      z-index: 100;
    }
    .result-yes { color: #2e7d32; font-size: 48px; font-weight: 700; }
    .result-no { color: #c62828; font-size: 48px; font-weight: 700; }
    .close-btn {
      position: absolute;
      top: 10px;
      right: 14px;
      background: none;
      border: none;
      font-size: 22px;
      cursor: pointer;
      color: #999;
    }
    .loading { text-align: center; padding: 40px; color: #666; }
  </style>
</head>
<body>
  <header>
    <h1>Ole Miss Parking</h1>
    <div class="user-info">
      <span id="userLabel">Guest</span>
      <button class="btn-logout" onclick="logout()">Logout</button>
    </div>
  </header>

  <main>
    <h2>Campus Parking Lots</h2>
    <div id="lots" class="loading">Loading lots...</div>
  </main>

  <div id="result-panel">
    <button class="close-btn" onclick="closePanel()">&times;</button>
    <div id="result-content"></div>
  </div>

  <script>
    const token = localStorage.getItem("token");
    const user = JSON.parse(localStorage.getItem("user") || "{}");
    const isVisitor = !token;

    if (user.first_name) {
      document.getElementById("userLabel").textContent =
        `${user.first_name} ${user.last_name} (${user.role})`;
    } else {
      document.getElementById("userLabel").textContent = "Visitor (browsing)";
    }

    function logout() {
      localStorage.clear();
      location.href = "/";
    }

    async function loadLots() {
      try {
        const res = await fetch("/api/lots");
        const data = await res.json();
        renderLots(data.lots);
      } catch (err) {
        document.getElementById("lots").innerHTML = "Failed to load lots: " + err.message;
      }
    }

    function renderLots(lots) {
      const html = lots.map(l => `
        <div class="lot-card" onclick="checkLot(${l.lot_id}, '${l.lot_name.replace(/'/g, "\\'")}')">
          <div class="lot-name">${l.lot_name}</div>
          <span class="status-badge status-${l.status_level}">${l.status_level}</span>
          <div class="bar-bg">
            <div class="bar-fill" style="width: ${l.occupancy_pct}%"></div>
          </div>
          <div class="lot-stats">
            <span>${l.current_occupancy} / ${l.capacity}</span>
            <span>${l.available_spaces} spots open</span>
          </div>
          ${l.ev_charger_count > 0 ? `<div style="margin-top:6px;font-size:12px;color:#1976d2;">⚡ ${l.ev_charger_count} EV chargers</div>` : ""}
        </div>
      `).join("");
      document.getElementById("lots").classList.remove("loading");
      document.getElementById("lots").className = "lots-grid";
      document.getElementById("lots").innerHTML = html;
    }

    async function checkLot(lotId, lotName) {
      if (isVisitor) {
        alert("Please log in to check parking eligibility. Visitors can still browse.");
        return;
      }

      try {
        const res = await fetch(`/api/me/check-parking/${lotId}`, {
          headers: { Authorization: `Bearer ${token}` },
        });
        if (res.status === 401) {
          alert("Session expired. Please log in again.");
          logout();
          return;
        }
        const data = await res.json();
        showResult(data);
      } catch (err) {
        alert("Error: " + err.message);
      }
    }

    function showResult(data) {
      const yesNo = data.can_park === "YES"
        ? `<div class="result-yes">✓ YES</div>`
        : `<div class="result-no">✗ NO</div>`;

      let warning = "";
      if (data.can_park === "YES") {
        if (data.occupancy_pct >= 90) {
          warning = `<p style="color:#c62828;margin-top:8px;">⚠️ Lot nearly full — only ${data.available_spaces} spots left</p>`;
        } else if (data.occupancy_pct >= 70) {
          warning = `<p style="color:#e65100;margin-top:8px;">Lot filling up — ${data.available_spaces} spots left</p>`;
        } else {
          warning = `<p style="color:#2e7d32;margin-top:8px;">${data.available_spaces} spots available</p>`;
        }
      } else {
        warning = `<p style="color:#666;margin-top:8px;">Your ${data.permit_name || "permit"} isn't valid at ${data.lot_name} right now.</p>`;
      }

      document.getElementById("result-content").innerHTML = `
        <h3 style="margin-bottom:8px;">${data.lot_name}</h3>
        ${yesNo}
        ${warning}
        <div style="margin-top:12px;font-size:13px;color:#666;">
          ${data.capacity ? `Capacity: ${data.capacity} · Occupied: ${data.current_occupancy} (${data.occupancy_pct}%)` : ""}
        </div>
      `;
      document.getElementById("result-panel").style.display = "block";
    }

    function closePanel() {
      document.getElementById("result-panel").style.display = "none";
    }

    loadLots();
  </script>
</body>
</html>
